            alias: "mrstft"

        metrics:
          - name: "snr_metric"
            alias: "snr"
          - name: "thd_metric"
            alias: "thd"
            params:
              eps: 1e-8
          - name: "zero_crossing_rate_metric"
            alias: "zcr"

