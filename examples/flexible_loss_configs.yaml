# Example 4: FlexibleLossWithMetrics for training with evaluation
model:
  class_path: nablafx.system.BlackBoxSystem
  init_args:
    lr: 0.001
    log_media_every_n_steps: 10000

    model:
      class_path: nablafx.models.BlackBoxModel
      init_args:
        # ... model config ...

    # NEW: FlexibleLoss with additional metrics
    loss:
      class_path: nablafx.evaluation.FlexibleLossWithMetrics
      init_args:
        losses:
          - name: "l1_loss"
            weight: 0.4
            alias: "l1"
          - name: "edc_loss"
            weight: 0.3
            alias: "edc"
          - name: "mrstft_loss"
