---
# Example 6: Advanced guitar amp modeling configuration
model:
  class_path: nablafx.system.GreyBoxSystem
  init_args:
    lr: 0.0008
    log_media_every_n_steps: 8000

    model:
      class_path: nablafx.models.GreyBoxModel
      init_args:
        # ... greybox model config ...

    # NEW: Specialized for guitar amp modeling
    loss:
      class_path: nablafx.evaluation.FlexibleLoss
      init_args:
        losses:
          # Core losses
          - name: "esr_loss"
            weight: 0.30
            alias: "esr"

          # Decay and sustain characteristics (critical for amps)
          - name: "edc_loss"
            weight: 0.25
            alias: "decay"
            params:
              remove_dc: true
              clamp: true
              min_db: -80

          # Tonal character (EQ response, harmonics)
          - name: "spectral_centroid_loss"
            weight: 0.15
            alias: "tone"
            params:
              n_fft: 2048
              eps: 1e-8

          # High-frequency content (amp filtering)
          - name: "spectral_rolloff_loss"
            weight: 0.10
            alias: "rolloff"
            params:
              n_fft: 2048
              rolloff_percent: 0.85

          # Perceptual accuracy
          - name: "a_weighting_loss"
            weight: 0.20
            alias: "perceptual"
            params:
              n_fft: 2048
              sample_rate: 48000
