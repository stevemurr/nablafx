# Updated config files for the new FlexibleLoss system
# This file shows examples of FlexibleLoss configurations

# Example 1: Simple L1 + Multi-Resolution STFT (equivalent to old config)
model:
  class_path: nablafx.system.BlackBoxSystemWithTBPTT
  init_args:
    lr: 0.001
    log_media_every_n_steps: 90000
    step_num_samples: 4800 # 100ms

    model:
      class_path: nablafx.models.BlackBoxModel
      init_args:
        processor:
          class_path: nablafx.processors.lstm.LSTM
          init_args:
            num_inputs: 1
            num_outputs: 1
            num_controls: 0
            hidden_size: 96
            num_layers: 1
            residual: false
            direct_path: false
            cond_type: null # null, fixed, tvcond
            cond_block_size: 128 # block size for tvcond
            cond_num_layers: 1 # number of lstm layers for tvcond

    # NEW: FlexibleLoss using registry-based functions
    loss:
      class_path: nablafx.evaluation.FlexibleLoss
      init_args:
        losses:
          - name: "l1_loss"
            weight: 0.5
            alias: "l1"
          - name: "mrstft_loss"
            weight: 0.5
            alias: "mrstft"
            params:
              fft_sizes: [1024, 2048, 512]
              hop_sizes: [256, 512, 128]
              win_lengths: [1024, 2048, 512]

---
# Example 2: Audio-specific loss combination for guitar effects
model:
  class_path: nablafx.system.BlackBoxSystem
  init_args:
    lr: 0.001
    log_media_every_n_steps: 10000

    model:
      class_path: nablafx.models.BlackBoxModel
      init_args:
        # ... model config ...

    # NEW: Guitar/instrument-focused loss configuration
    loss:
      class_path: nablafx.evaluation.FlexibleLoss
      init_args:
        losses:
          # Time-domain losses
          - name: "l1_loss"
            weight: 0.3
            alias: "l1"
          - name: "esr_loss"
            weight: 0.2
            alias: "esr"

          # Audio-specific losses for guitar effects
          - name: "edc_loss"
            weight: 0.2
            alias: "edc"
            params:
              remove_dc: true
              min_db: -80
              max_db: 0

          - name: "spectral_centroid_loss"
            weight: 0.1
            alias: "centroid"
            params:
              n_fft: 1024

          # Frequency-domain losses
          - name: "mrstft_loss"
            weight: 0.2
            alias: "mrstft"
            params:
              fft_sizes: [1024, 2048, 512]

---
# Example 3: Complex multi-domain loss for high-quality modeling
model:
  class_path: nablafx.system.BlackBoxSystem
  init_args:
    lr: 0.0005
    log_media_every_n_steps: 5000

    model:
      class_path: nablafx.models.BlackBoxModel
      init_args:
        # ... model config ...

    # NEW: Comprehensive loss configuration
    loss:
      class_path: nablafx.evaluation.FlexibleLoss
      init_args:
        losses:
          # Time-domain fundamental losses
          - name: "l1_loss"
            weight: 0.25
            alias: "l1"
          - name: "esr_loss"
            weight: 0.15
            alias: "esr"
          - name: "dc_loss"
            weight: 0.05
            alias: "dc"

          # Audio-specific guitar modeling losses
          - name: "edc_loss"
            weight: 0.15
            alias: "edc"
            params:
              remove_dc: true
              eps: 1e-8

          - name: "spectral_centroid_loss"
            weight: 0.05
            alias: "brightness"
            params:
              n_fft: 1024

          - name: "a_weighting_loss"
            weight: 0.10
            alias: "perceptual"
            params:
              n_fft: 1024
              sample_rate: 48000

          # Frequency-domain losses
          - name: "mrstft_loss"
            weight: 0.20
            alias: "mrstft"
            params:
              fft_sizes: [2048, 1024, 512]
              hop_sizes: [512, 256, 128]
              win_lengths: [2048, 1024, 512]

