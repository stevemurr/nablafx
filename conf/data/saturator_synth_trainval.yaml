_target_: nablafx.data.DryWetFilesPluginDataModule
root_dir_dry: ${dataset_root}/tone_sat/DRY/trainval
root_dir_wet: ${dataset_root}/tone_sat/WET/trainval
# Non-parametric — no param letters in filenames. null routes to PluginDataset.
params_idxs_to_use: null
data_to_use: 1.0
trainval_split: 0.9
sample_length: 44100  # 1.0 s @ 44.1 kHz
sample_rate: 44100
preload: true
batch_size: 64
num_workers: 4
persistent_workers: true
