defaults:
  - _self_
  - data: ???
  - model: ???
  - trainer: bb

# One of: fit | validate | test. Defaults to fit.
# `ckpt_path` is required for validate / test; optional for fit (to resume).
mode: fit
ckpt_path: null

# Root directory for datasets. Data configs reference this via ${dataset_root}.
# Override on the CLI, e.g. `dataset_root=/shared/datasets`.
dataset_root: /home/murr/jupyter-redux/datasets

hydra:
  job:
    chdir: false
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
