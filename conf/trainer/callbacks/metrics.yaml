_target_: nablafx.callbacks.MetricsLoggingCallback
log_on_step: false
log_on_epoch: true
sync_dist: true
prefix: metric
metrics:
  - name: l1_loss
    alias: l1
  - name: mape_loss
    alias: mape
  - name: mse_loss
    alias: mse
  - name: smooth_l1_loss
    alias: smooth_l1
  - name: huber_loss
    alias: huber
  - name: esr_loss
    alias: esr
  - name: dc_loss
    alias: dc
  - name: si_sdr_loss
    alias: si_sdr
  - name: snr_metric
    alias: snr
  - name: thd_metric
    alias: thd
  - name: cosine_similarity_loss
    alias: cosine_similarity
  - name: log_cosh_loss
    alias: log_cosh
  - name: stft_loss
    alias: stft
  - name: mrstft_loss
    alias: mrstft
  - name: melstft_loss
    alias: melstft
    params:
      sample_rate: 48000
  - name: random_stft_loss
    alias: random_stft
  - name: edc_loss
    alias: edc
  - name: spectral_centroid_loss
    alias: spectral_centroid
  - name: spectral_rolloff_loss
    alias: spectral_rolloff
  - name: a_weighting_loss
    alias: a_weighting
  - name: zero_crossing_rate_metric
    alias: zero_crossing_rate
