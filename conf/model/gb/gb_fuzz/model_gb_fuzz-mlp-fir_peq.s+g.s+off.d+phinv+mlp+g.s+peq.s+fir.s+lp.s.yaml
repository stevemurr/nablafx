_target_: nablafx.GreyBoxSystem
lr: 0.1
use_callbacks: true
log_media_every_n_steps: 3000
model:
  _target_: nablafx.GreyBoxModel
  processors:
  - _target_: nablafx.processors.ParametricEQ
    sample_rate: 48000
    min_gain_db: -12.0
    max_gain_db: 12.0
    min_q_factor: 0.1
    max_q_factor: 10.0
    block_size: 128
    control_type: static
  - _target_: nablafx.processors.Gain
    sample_rate: 48000
    min_gain_db: -40.0
    max_gain_db: 40.0
    control_type: static
  - _target_: nablafx.processors.DCOffset
    sample_rate: 48000
    min_offset: -2.0
    max_offset: 2.0
    control_type: dynamic
  - _target_: nablafx.processors.PhaseInversion
    sample_rate: 48000
  - _target_: nablafx.processors.StaticMLPNonlinearity
    sample_rate: 48000
    hidden_dim: 32
    num_layers: 3
    w0_initial: 30.0
    pretrained: weights/static_mlp_nonlinearity_h32-l3_tanh.pt
    lr_multiplier: 0.01
  - _target_: nablafx.processors.Gain
    sample_rate: 48000
    min_gain_db: -40.0
    max_gain_db: 40.0
    control_type: static
  - _target_: nablafx.processors.ParametricEQ
    sample_rate: 48000
    min_gain_db: -12.0
    max_gain_db: 12.0
    min_q_factor: 0.1
    max_q_factor: 10.0
    block_size: 128
    control_type: static
  - _target_: nablafx.processors.StaticFIRFilter
    sample_rate: 48000
    n_taps: 64
    hidden_dim: 32
    num_layers: 5
    w0_initial: 1000.0
    pretrained: weights/static_fir_filter_t64-h32-l5.pt
    lr_multiplier: 0.01
  - _target_: nablafx.processors.Lowpass
    sample_rate: 48000
    min_cutoff_freq: 20000
    max_cutoff_freq: 20000
    min_q_factor: 0.7
    max_q_factor: 0.7
    block_size: 128
    control_type: static
  num_controls: 0
  stat_control_params_initial: rnd
  stat_cond_num_layers: 3
  stat_cond_hidden_dim: 16
  dyn_block_size: 128
  dyn_num_layers: 1
  dyn_cond_block_size: 128
  dyn_cond_num_layers: 1
loss:
  _target_: nablafx.evaluation.FlexibleLoss
  losses:
  - name: l1_loss
    weight: 5
    alias: l1
  - name: mrstft_loss
    weight: 5
    alias: mrstft
