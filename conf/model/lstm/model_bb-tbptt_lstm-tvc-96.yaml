_target_: nablafx.BlackBoxSystemWithTBPTT
lr: 0.001
log_media_every_n_steps: 30000
step_num_samples: 12000
model:
  _target_: nablafx.BlackBoxModel
  processor:
    _target_: nablafx.processors.lstm.LSTM
    num_inputs: 1
    num_outputs: 1
    num_controls: 0
    hidden_size: 96
    num_layers: 1
    residual: true
    direct_path: false
    cond_type: tvcond
    cond_block_size: 128
    cond_num_layers: 1
loss:
  _target_: nablafx.evaluation.FlexibleLoss
  losses:
  - name: l1_loss
    weight: 10
    alias: l1
  - name: mrstft_loss
    weight: 1
    alias: mrstft
