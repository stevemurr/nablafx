trainer:
  gradient_clip_val: 10.0
  gradient_clip_algorithm: value
  max_steps: 15000

  logger:
    class_path: lightning.pytorch.loggers.wandb.WandbLogger
    init_args:
      entity: mcomunita
      project: nablafx
      name: bb_S4-B4-S4-C16_lr.01_td.5_fd.5
      save_dir: logs/ampeg-optocomp/S4/bb_S4-B4-S4-C16_lr.01_td.5_fd.5 # dir needs to already exist
      group: Ampeg-OptoComp_S4
      tags: ["Ampeg-OptoComp", "S4"]

  callbacks:
    # Audio Logging
    - class_path: nablafx.callbacks.AudioLoggingCallback
      init_args:
        log_every_n_steps: 3000
        sample_rate: 48000
        max_samples_per_batch: 3
        log_test_batches: 10
        log_input_target_once: true

    # Metrics Logging
    - class_path: nablafx.callbacks.MetricsLoggingCallback
      init_args:
        metrics:
          - name: "l1_loss"
            alias: "l1"
          - name: "mape_loss"
            alias: "mape"
          - name: "mse_loss"
            alias: "mse"
          - name: "smooth_l1_loss"
            alias: "smooth_l1"
          - name: "huber_loss"
            alias: "huber"
          - name: "esr_loss"
            alias: "esr"
          - name: "dc_loss"
            alias: "dc"
          - name: "si_sdr_loss"
            alias: "si_sdr"
          - name: "snr_metric"
            alias: "snr"
          - name: "thd_metric"
            alias: "thd"
          - name: "cosine_similarity_loss"
            alias: "cosine_similarity"
          - name: "log_cosh_loss"
            alias: "log_cosh"
          - name: "stft_loss"
            alias: "stft"
          - name: "mrstft_loss"
            alias: "mrstft"
          - name: "melstft_loss"
            alias: "melstft"
            params:
              sample_rate: 48000
          - name: "random_stft_loss"
            alias: "random_stft"
          - name: "edc_loss"
            alias: "edc"
          - name: "spectral_centroid_loss"
            alias: "spectral_centroid"
          - name: "spectral_rolloff_loss"
            alias: "spectral_rolloff"
          - name: "a_weighting_loss"
            alias: "a_weighting"
          - name: "zero_crossing_rate_metric"
            alias: "zero_crossing_rate"
        log_on_step: false
        log_on_epoch: true
        sync_dist: true
        prefix: "metric"

    # Frequency Response
    # - class_path: nablafx.callbacks.FrequencyResponseCallback
    #   init_args:
    #     log_on_train_start: true
    #     log_on_train_end: false
    #     log_on_test_end: true
    #     log_every_n_epochs: null

    # Frechet Audio Distance
    # - class_path: nablafx.callbacks.FADComputationCallback
    #   init_args:
    #     compute_on_train_end: false
    #     compute_on_test_end: true
    #     compute_every_n_epochs: null
    #     fad_metrics:
    #       - name: "fad_vggish_metric"
    #         alias: "vggish"
    #         params:
    #           use_pca: false
    #       - name: "fad_pann_metric"
    #         alias: "pann"
    #       - name: "fad_clap_metric"
    #         alias: "clap"
    #         params:
    #           submodel_name: "630k-audioset"
    #           enable_fusion: false
    #       # AFX-Rep metric disabled - not supported by current frechet_audio_distance package
    #       # - name: "fad_afxrep_metric"
    #       #   alias: "afx-rep"
    #     checkpoint_dir: "checkpoints_fad"
    #     prefix: "fad"

    - class_path: lightning.pytorch.callbacks.model_checkpoint.ModelCheckpoint
      init_args:
        save_last: true
        save_top_k: 1
        monitor: loss/val/tot
        every_n_train_steps: 100
        filename: "{epoch}-{step}"

    - class_path: lightning.pytorch.callbacks.ModelSummary
      init_args:
        max_depth: 2

    - class_path: lightning.pytorch.callbacks.LearningRateMonitor

    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: "loss/val/tot"
        patience: 50
        verbose: true
