trainer:
  gradient_clip_val: null # gradient clip applied manually in training step
  max_steps: 451000

  logger:
    # class_path: pytorch_lightning.loggers.WandbLogger
    class_path: lightning.pytorch.loggers.wandb.WandbLogger
    init_args:
      entity: team-mcomunita-qmul
      project: nnlinafx-PARAM
      name: bb_LSTM-TVC-96_lr.001_td.5_fd.5
      save_dir: logs-scratch-02/multidrive-ffuzz/LSTM-TVC/bb_LSTM-TVC-96_lr.001_td.5_fd.5 # dir needs to already exist
      group: Multidrive-FFuzz_LSTM-TVC
      tags: ["Multidrive-FFuzz", "LSTM-TVC"]
  callbacks:
    # 🎵 NablAFx Audio Logging - Replaces built-in log_audio()
    - class_path: nablafx.callbacks.AudioLoggingCallback
      init_args:
        log_every_n_steps: 5000 # Less frequent for TBPTT (longer training)
        sample_rate: 48000
        max_samples_per_batch: 3
        log_test_batches: 10
        log_input_target_once: true

    # 📊 NablAFx Metrics Logging - Registry-based configurable metrics
    - class_path: nablafx.callbacks.MetricsLoggingCallback
      init_args:
        metrics:
          # Audio-specific metrics for guitar/amp modeling
          - name: "snr_metric"
            alias: "snr"
          - name: "thd_metric"
            alias: "thd"
            params:
              eps: 1e-8
          - name: "zero_crossing_rate_metric"
            alias: "zcr"
          # You can also use differentiable functions as metrics (logged but not optimized)
          - name: "edc_loss"
            alias: "edc_metric"
            params:
              remove_dc: true
              min_db: -80
          - name: "spectral_centroid_loss"
            alias: "brightness"
            params:
              n_fft: 1024
        log_on_step: false
        log_on_epoch: true
        sync_dist: true
        prefix: "metric"

    # 🎛️ NablAFx Frequency Response - Replaces built-in log_frequency_response()
    - class_path: nablafx.callbacks.FrequencyResponseCallback
      init_args:
        log_on_train_start: false
        log_on_train_end: false
        log_on_test_end: true
        log_every_n_epochs: 50 # Less frequent for longer training

    # 🎯 NablAFx FAD Computation - Registry-based configurable FAD models
    - class_path: nablafx.callbacks.FADComputationCallback
      init_args:
        compute_on_train_end: true
        compute_on_test_end: true
        compute_every_n_epochs: 25 # Less frequent for longer training
        fad_metrics:
          # Specific FAD models for comprehensive evaluation
          - name: "fad_vggish_metric"
            alias: "vggish"
            params:
              use_pca: false
          - name: "fad_pann_metric"
            alias: "pann"
          - name: "fad_clap_metric"
            alias: "clap"
            params:
              submodel_name: "630k-audioset"
              enable_fusion: false
          # AFX-Rep metric disabled - not supported by current frechet_audio_distance package
          # - name: "fad_afxrep_metric"
          #   alias: "afx-rep"
        checkpoint_dir: "checkpoints_fad"
        prefix: "fad"

    # ⚡ Standard Lightning Callbacks
    # - class_path: pytorch_lightning.callbacks.ModelCheckpoint
    - class_path: lightning.pytorch.callbacks.model_checkpoint.ModelCheckpoint
      init_args:
        save_last: true
        save_top_k: 1
        monitor: loss/val/tot
        every_n_train_steps: 3000
        filename: "{epoch}-{step}"
    # - class_path: pytorch_lightning.callbacks.ModelSummary
    - class_path: lightning.pytorch.callbacks.ModelSummary
      init_args:
        max_depth: 2
    # - class_path: pytorch_lightning.callbacks.LearningRateMonitor
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
    # - class_path: pytorch_lightning.callbacks.EarlyStopping
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: "loss/val/tot"
        patience: 50
        verbose: true
