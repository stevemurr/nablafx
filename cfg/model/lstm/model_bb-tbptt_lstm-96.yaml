model:
  class_path: nablafx.system.BlackBoxSystemWithTBPTT
  init_args:
    lr: 0.001
    log_media_every_n_steps: 90000
    step_num_samples: 4800 # 100ms

    model:
      class_path: nablafx.models.BlackBoxModel
      init_args:
        processor:
          class_path: nablafx.processors.lstm.LSTM
          init_args:
            num_inputs: 1
            num_outputs: 1
            num_controls: 0
            hidden_size: 96
            num_layers: 1
            residual: false
            direct_path: false
            cond_type: null # null, fixed, tvcond
            cond_block_size: 128 # block size for tvcond
            cond_num_layers: 1 # number of lstm layers for tvcond

    # Updated to use FlexibleLoss with registry-based functions
    loss:
      class_path: nablafx.evaluation.FlexibleLoss
      init_args:
        losses:
          - name: "l1_loss"
            weight: 0.5
            alias: "l1"
          - name: "mrstft_loss"
            weight: 0.5
            alias: "mrstft"
            params:
              fft_sizes: [1024, 2048, 512]
              hop_sizes: [256, 512, 128]
              win_lengths: [1024, 2048, 512]
