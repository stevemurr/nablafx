model:
  class_path: nablafx.system.GreyBoxSystem
  init_args:
    lr: 0.1
    use_callbacks: true
    log_media_every_n_steps: 3000
    model:
      class_path: nablafx.models.GreyBoxModel
      init_args:
        processors:
        - class_path: nablafx.processors.ParametricEQ
          init_args:
            sample_rate: 48000
            min_gain_db: -12.0
            max_gain_db: 12.0
            min_q_factor: 0.1
            max_q_factor: 10.0
            block_size: 128
            control_type: static
        - class_path: nablafx.processors.PhaseInversion
          init_args:
            sample_rate: 48000
        - class_path: nablafx.processors.Gain
          init_args:
            sample_rate: 48000
            min_gain_db: -40.0
            max_gain_db: 40.0
            control_type: dynamic
        - class_path: nablafx.processors.ParametricEQ
          init_args:
            sample_rate: 48000
            min_gain_db: -12.0
            max_gain_db: 12.0
            min_q_factor: 0.1
            max_q_factor: 10.0
            block_size: 128
            control_type: static
        - class_path: nablafx.processors.Gain
          init_args:
            sample_rate: 48000
            min_gain_db: -40.0
            max_gain_db: 40.0
            control_type: static
        num_controls: 0
        stat_control_params_initial: rnd
        stat_cond_num_layers: 3
        stat_cond_hidden_dim: 16
        dyn_block_size: 128
        dyn_num_layers: 1
        dyn_cond_block_size: 128
        dyn_cond_num_layers: 1
    loss:
      class_path: nablafx.evaluation.FlexibleLoss
      init_args:
        losses:
        - name: l1_loss
          weight: 1
          alias: l1
        - name: mrstft_loss
          weight: 0.1
          alias: mrstft
