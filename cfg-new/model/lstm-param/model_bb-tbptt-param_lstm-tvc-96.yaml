model:
  class_path: nablafx.system.BlackBoxSystemWithTBPTT
  init_args:
    lr: 0.001
    log_media_every_n_steps: 90000
    step_num_samples: 4800
    model:
      class_path: nablafx.models.BlackBoxModel
      init_args:
        processor:
          class_path: nablafx.processors.lstm.LSTM
          init_args:
            num_inputs: 1
            num_outputs: 1
            num_controls: 1
            hidden_size: 96
            num_layers: 1
            residual: false
            direct_path: false
            cond_type: tvcond
            cond_block_size: 128
            cond_num_layers: 1
    loss:
      class_path: nablafx.evaluation.FlexibleLoss
      init_args:
        losses:
        - name: l1_loss
          weight: 0.5
          alias: l1
        - name: mrstft_loss
          weight: 0.5
          alias: mrstft
